baseURL: https://youdward.github.io/
locale: zh-cn
title: 我的个人博客
theme: PaperMod

# 默认内容语言
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

# 分页设置
paginate: 10

# 启用 robots.txt
enableRobotsTXT: true

# 构建草稿
buildDrafts: false

# 构建未来文章
buildFuture: false

# 构建过期文章
buildExpired: false

# Google Analytics (可选)
# googleAnalytics: UA-123-45

# Minify 输出
minify:
  disableXML: true
  minifyOutput: true

# 文章配置
frontmatter:
  date: [":filename", ":default"]
  lastmod: [":git", "lastmod", ":fileModTime", ":default"]

# Permalink 设置
permalinks:
  posts: /posts/:title/

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 站点参数
params:
  env: production
  title: 我的博客
  description: "一个简洁美观的个人博客"
  keywords: [Blog, Portfolio, PaperMod]
  author: 博主
  # 作者图像
  # author: ["Me", "You"]
  # images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "2006-01-02"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  # 显示阅读时间
  ShowReadingTime: true
  # 显示分享按钮
  ShowShareButtons: true
  # 显示文章导航
  ShowPostNavLinks: true
  # 显示面包屑
  ShowBreadCrumbs: true
  # 显示代码复制按钮
  ShowCodeCopyButtons: true
  # 显示字数统计
  ShowWordCount: true
  # 显示 RSS
  ShowRssButtonInSectionTermList: true
  # 显示全宽内容
  ShowFullWidthInRSS: true
  # 使用 Hugo Toc
  UseHugoToc: true
  # 显示目录
  showtoc: true
  # 目录自动展开
  tocopen: true

  # 评论系统 (可选)
  # comments: true
  # giscus:
  #   repo: "username/repo"
  #   repoId: "xxx"
  #   category: "Announcements"
  #   categoryId: "xxx"
  #   mapping: "pathname"
  #   reactionsEnabled: "1"
  #   emitMetadata: "0"
  #   inputPosition: "top"
  #   theme: "preferred_color_scheme"
  #   lang: "zh-CN"
  #   loading: "lazy"

  # 主页信息模式
  homeInfoParams:
    Title: "你好\U0001F44B, 欢迎来到我的博客"
    Content: >
      这里是油德华的个人空间，记录技术和分享热爱。

  # 社交图标
  socialIcons:
    - name: github
      url: "https://github.com/username"
    - name: twitter
      url: "https://twitter.com/username"
    # - name: email
    #   url: "mailto:your@email.com"
    # - name: rss
    #   url: "/index.xml"

  # 分析配置 (可选)
  # analytics:
  #   google:
  #     SiteVerificationTag: "XYZabc"
  #   bing:
  #     SiteVerificationTag: "XYZabc"
  #   yandex:
  #     SiteVerificationTag: "XYZabc"

  # 封面图片
  cover:
    linkFullImages: true
    responsiveImages: true
    # 隐藏封面图片
    hidden: false
    # 隐藏首页封面图片
    hiddenInList: false
    # 隐藏文章页封面图片
    hiddenInSingle: false

  # 编辑文章链接 (可选)
  # editPost:
  #   URL: "https://github.com/<path_to_repo>/content"
  #   Text: "Suggest Changes"
  #   appendFilePath: true

  # 文章元信息
  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # 个人资料模式 (可选，替代 homeInfoParams)
  # profileMode:
  #   enabled: false
  #   title: ExampleSite
  #   subtitle: "This is subtitle"
  #   imageUrl: "<img location>"
  #   imageWidth: 120
  #   imageHeight: 120
  #   imageTitle: my image
  #   buttons:
  #     - name: Posts
  #       url: posts
  #     - name: Tags
  #       url: tags

  # 文章设置
  assets:
    # 网站图标
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    # safari_pinned_tab: "/safari-pinned-tab.svg"
    # 禁用指纹
    disableFingerprint: false
    # 主题颜色
    theme_color: "#2e2e33"
    msapplication_TileColor: "#2e2e33"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# 菜单配置
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 40
    - identifier: search
      name: 搜索
      url: /search/
      weight: 50
    # - identifier: about
    #   name: 关于
    #   url: /about/
    #   weight: 60

# 代码高亮
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
  highlight:
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: true
    noHl: false
    style: "monokai"
    tabWidth: 4
  tableOfContents:
    endLevel: 6
    ordered: false
    startLevel: 2

# 站点地图
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

# RSS
rssLimit: 20

# 隐私配置
privacy:
  googleAnalytics:
    anonymizeIP: true
    disable: false
    respectDoNotTrack: true
    useSessionStorage: true
  x:
    disable: false
    enableDNT: true
    simple: true

# 相关文章
related:
  includeNewer: true
  indices:
    - name: tags
      weight: 100
    - name: date
      weight: 10
  threshold: 80
  toLower: true
